version: '3.4'

services:
  db:
    image: postgres:16-alpine
    container_name: "db"
    hostname: "db"
    environment:
      TZ: Asia/Shanghai
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - ./postgresql/data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eval_user"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks:
      - default_bridge

  backend:
    build: ./backend
    container_name: "backend"
    hostname: "backend"
    ports:
      - "${BACKEND_PORT}:8000"
    environment:
      TZ: Asia/Shanghai
      EVAL_DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}
      EVAL_DEBUG: ${EVAL_DEBUG}
      EVAL_CORS_ORIGINS: ${EVAL_CORS_ORIGINS:-["*"]}
      EVAL_ALLOW_PRIVATE_URLS: ${EVAL_ALLOW_PRIVATE_URLS:-false}
    depends_on:
      - db
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    networks:
      - default_bridge

  frontend:
    build: ./frontend
    container_name: "frontend"
    hostname: "frontend"
    ports:
      - "${FRONTEND_PORT}:80"
    environment:
      TZ: Asia/Shanghai
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - default_bridge

networks:
  default_bridge:
    external: true